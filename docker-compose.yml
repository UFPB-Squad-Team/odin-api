version: "3.8"

services:
  api:
    build:
      context: .   # Correto!
      dockerfile: Dockerfile
    container_name: odin-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Comando vital para manter o contêiner rodando o FastAPI
    command: poetry run uvicorn src.main:app --host 0.0.0.0 --port 8000